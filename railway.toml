[build]
builder = "nixpacks"
buildCommand = "npx prisma generate && npm run build"

[deploy]
startCommand = "mkdir -p /data/storage/uploads/screenshots /data/storage/uploads/attachments /data/storage/reports /data/storage/sessions && npx prisma migrate deploy && npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
